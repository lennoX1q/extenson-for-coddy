<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Log — Coding Automator</title>
  <link rel="stylesheet" href="log.css">
</head>
<body>
  <header>
    <h1>Activity Log</h1>
    <div class="actions">
      <button id="refresh-btn">Refresh</button>
      <button id="clear-btn" class="danger">Clear log</button>
    </div>
  </header>

  <main id="log-container">
    <p class="empty">No activity yet. Click Start on the extension popup and open a practice question.</p>
  </main>

  <script src="log.js"></script>
</body>
</html>
